<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- Steward — S22 "Read mode". Palette: union slate #2a3f54 / blue #337ab7 / teal #1abb9c / red #e74c3c. -->
  <rect width="1000" height="520" fill="#f7f7f7"/>
  <rect width="1000" height="88" fill="#2a3f54"/>
  <circle cx="52" cy="44" r="22" fill="none" stroke="#1abb9c" stroke-width="4"/>
  <path d="M42 44 l7 8 l13 -16" fill="none" stroke="#1abb9c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="90" y="52" font-size="26" font-weight="800" fill="#ecf0f1">Steward</text>
  <text x="215" y="52" font-size="17" fill="#8aa0b3">learned to read</text>

  <!-- 1. Speak -->
  <g transform="translate(70,180)">
    <rect x="0" y="0" width="210" height="150" rx="16" fill="#ffffff" stroke="#e6e9ed" stroke-width="2"/>
    <rect x="92" y="26" width="26" height="52" rx="13" fill="#337ab7"/>
    <path d="M78 66 a27 27 0 0 0 54 0" fill="none" stroke="#337ab7" stroke-width="5"/>
    <line x1="105" y1="93" x2="105" y2="108" stroke="#337ab7" stroke-width="5"/>
    <text x="105" y="132" text-anchor="middle" font-size="19" font-weight="700" fill="#2a3f54">Speak it</text>
  </g>
  <text x="300" y="262" font-size="34" fill="#95a0ad">→</text>

  <!-- 2. Find (magnifier over an article) -->
  <g transform="translate(345,180)">
    <rect x="0" y="0" width="210" height="150" rx="16" fill="#ffffff" stroke="#e6e9ed" stroke-width="2"/>
    <line x1="34" y1="40" x2="150" y2="40" stroke="#d5dae0" stroke-width="6" stroke-linecap="round"/>
    <line x1="34" y1="62" x2="150" y2="62" stroke="#eef1f4" stroke-width="6" stroke-linecap="round"/>
    <line x1="34" y1="84" x2="120" y2="84" stroke="#eef1f4" stroke-width="6" stroke-linecap="round"/>
    <circle cx="128" cy="74" r="30" fill="none" stroke="#337ab7" stroke-width="6"/>
    <line x1="150" y1="96" x2="176" y2="122" stroke="#337ab7" stroke-width="8" stroke-linecap="round"/>
    <text x="105" y="132" text-anchor="middle" font-size="19" font-weight="700" fill="#2a3f54">Find the article</text>
  </g>
  <text x="575" y="262" font-size="34" fill="#95a0ad">→</text>

  <!-- 3a. Verified -->
  <g transform="translate(620,120)">
    <rect x="0" y="0" width="300" height="118" rx="16" fill="#ffffff" stroke="#1abb9c" stroke-width="3"/>
    <circle cx="42" cy="59" r="24" fill="#1abb9c"/>
    <path d="M31 59 l8 9 l14 -18" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="52" font-size="19" font-weight="800" fill="#2a3f54">Cite-verified article</text>
    <text x="80" y="80" font-size="15" fill="#73879c">the exact rule — read aloud</text>
  </g>

  <!-- 3b. Honest miss -->
  <g transform="translate(620,262)">
    <rect x="0" y="0" width="300" height="118" rx="16" fill="#eef1f4" stroke="#d5dae0" stroke-width="3"/>
    <circle cx="42" cy="59" r="24" fill="none" stroke="#95a0ad" stroke-width="4"/>
    <line x1="30" y1="59" x2="54" y2="59" stroke="#95a0ad" stroke-width="5" stroke-linecap="round"/>
    <text x="80" y="52" font-size="19" font-weight="800" fill="#2a3f54">“Couldn’t ground that”</text>
    <text x="80" y="80" font-size="15" fill="#73879c">stays silent, never guesses</text>
  </g>

  <text x="500" y="470" text-anchor="middle" font-size="19" font-style="italic" fill="#2a3f54">A wrong citation harms a stranger — so it would rather say nothing.</text>
  <text x="500" y="500" text-anchor="middle" font-size="14" fill="#95a0ad">Build in public · ship honest · a tool for the crew</text>
</svg>
