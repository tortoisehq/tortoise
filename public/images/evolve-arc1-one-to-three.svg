<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Arc 1: one reviewing agent became three. Claude dispatches, Codex executes and compiles, Gemini gives an independent lens. Together they caught a P0 one agent had missed.">
  <rect width="1200" height="600" fill="#0b0b0c"/>
  <text x="100" y="90" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" letter-spacing="5" fill="#f59e0b">// ARC 1 — ONE LENS BECAME THREE</text>

  <!-- one -->
  <rect x="100" y="230" width="240" height="120" fill="none" stroke="#57534e" stroke-width="2"/>
  <text x="220" y="285" font-family="ui-monospace, monospace" font-size="24" fill="#a8a29e" text-anchor="middle">Claude</text>
  <text x="220" y="316" font-family="ui-monospace, monospace" font-size="16" fill="#78716c" text-anchor="middle">one agent</text>

  <text x="380" y="298" font-family="ui-monospace, monospace" font-size="40" fill="#f59e0b">&#8594;</text>

  <!-- three -->
  <rect x="470" y="150" width="240" height="100" fill="#fafaf9"/>
  <text x="590" y="195" font-family="ui-monospace, monospace" font-size="22" fill="#0b0b0c" text-anchor="middle">Claude</text>
  <text x="590" y="223" font-family="ui-monospace, monospace" font-size="15" fill="#44403c" text-anchor="middle">dispatch / architect</text>

  <rect x="470" y="270" width="240" height="100" fill="#fafaf9"/>
  <text x="590" y="315" font-family="ui-monospace, monospace" font-size="22" fill="#0b0b0c" text-anchor="middle">Codex</text>
  <text x="590" y="343" font-family="ui-monospace, monospace" font-size="15" fill="#44403c" text-anchor="middle">executes · compiles</text>

  <rect x="470" y="390" width="240" height="100" fill="#fafaf9"/>
  <text x="590" y="435" font-family="ui-monospace, monospace" font-size="22" fill="#0b0b0c" text-anchor="middle">Gemini</text>
  <text x="590" y="463" font-family="ui-monospace, monospace" font-size="15" fill="#44403c" text-anchor="middle">independent lens</text>

  <!-- shared repo -->
  <text x="760" y="305" font-family="ui-monospace, monospace" font-size="40" fill="#f59e0b">&#8594;</text>
  <rect x="850" y="250" width="250" height="100" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="975" y="295" font-family="ui-monospace, monospace" font-size="20" fill="#f59e0b" text-anchor="middle">shared git repo</text>
  <text x="975" y="323" font-family="ui-monospace, monospace" font-size="15" fill="#a8a29e" text-anchor="middle">the channel</text>

  <!-- caption -->
  <text x="100" y="545" font-family="ui-monospace, monospace" font-size="22" fill="#fafaf9">three vendors, one repo — caught a P0 one agent had missed</text>
</svg>
