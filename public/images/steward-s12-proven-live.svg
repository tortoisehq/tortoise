<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="The live two-member idempotency test, run on the production database, passing eight checks out of eight: replay returns the same report, only one row stored, a different submit still files, member B cannot see member A's report, and the server set the owner, not the client.">
  <rect width="1200" height="600" fill="#0b0b0c"/>
  <text x="100" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" letter-spacing="4" fill="#f59e0b">// PROVEN ON THE LIVE DATABASE</text>

  <!-- terminal frame -->
  <rect x="100" y="120" width="1000" height="400" fill="#111113" stroke="#27272a" stroke-width="1"/>
  <text x="128" y="166" font-family="ui-monospace, monospace" font-size="19" fill="#78716c">$ npm run idempotency-live-test  &#8212;  two real members, live prod</text>

  <text x="128" y="212" font-family="ui-monospace, monospace" font-size="20" fill="#4ade80">&#10003; PASS</text>
  <text x="230" y="212" font-family="ui-monospace, monospace" font-size="20" fill="#d6d3d1">a retry returns the same report (no double-file)</text>

  <text x="128" y="250" font-family="ui-monospace, monospace" font-size="20" fill="#4ade80">&#10003; PASS</text>
  <text x="230" y="250" font-family="ui-monospace, monospace" font-size="20" fill="#d6d3d1">exactly one grievance stored for that key</text>

  <text x="128" y="288" font-family="ui-monospace, monospace" font-size="20" fill="#4ade80">&#10003; PASS</text>
  <text x="230" y="288" font-family="ui-monospace, monospace" font-size="20" fill="#d6d3d1">a genuinely new submit still files</text>

  <text x="128" y="326" font-family="ui-monospace, monospace" font-size="20" fill="#4ade80">&#10003; PASS</text>
  <text x="230" y="326" font-family="ui-monospace, monospace" font-size="20" fill="#d6d3d1">member B cannot see member A&#39;s report</text>

  <text x="128" y="364" font-family="ui-monospace, monospace" font-size="20" fill="#4ade80">&#10003; PASS</text>
  <text x="230" y="364" font-family="ui-monospace, monospace" font-size="20" fill="#d6d3d1">the server set the owner, not the client</text>

  <text x="128" y="402" font-family="ui-monospace, monospace" font-size="20" fill="#4ade80">&#10003; PASS</text>
  <text x="230" y="402" font-family="ui-monospace, monospace" font-size="20" fill="#d6d3d1">&#8230; and three more</text>

  <line x1="128" y1="430" x2="1072" y2="430" stroke="#27272a" stroke-width="1"/>
  <text x="128" y="476" font-family="ui-monospace, monospace" font-size="24" fill="#4ade80">[PASS]  8 / 8  &#8212;  0 failures, test rows cleaned up</text>

  <!-- caption -->
  <text x="100" y="565" font-family="ui-monospace, monospace" font-size="19" fill="#78716c">not &#8220;it compiles&#8221; &#8212; run for real on the live database, eight for eight</text>
</svg>
