<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1726"/>
      <stop offset="1" stop-color="#1b2942"/>
    </linearGradient>
    <linearGradient id="build" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="1" stop-color="#f0a330"/>
    </linearGradient>
    <linearGradient id="break" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ad0ff"/>
      <stop offset="1" stop-color="#3b9ae0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- left: the builder -->
  <g transform="translate(300 300)">
    <circle r="135" fill="none" stroke="url(#build)" stroke-width="4" opacity="0.5"/>
    <!-- stacked blocks -->
    <g fill="url(#build)">
      <rect x="-60" y="10" width="120" height="34" rx="6"/>
      <rect x="-46" y="-30" width="92" height="34" rx="6"/>
      <rect x="-30" y="-70" width="60" height="34" rx="6"/>
    </g>
    <text x="0" y="118" text-anchor="middle" fill="#ffd27a" font-size="30" letter-spacing="2">BUILD</text>
  </g>

  <!-- connector -->
  <line x1="455" y1="300" x2="745" y2="300" stroke="#3a4a66" stroke-width="3" stroke-dasharray="2 14" stroke-linecap="round"/>

  <!-- right: the breaker -->
  <g transform="translate(900 300)">
    <circle r="135" fill="none" stroke="url(#break)" stroke-width="4" opacity="0.5"/>
    <!-- magnifying glass -->
    <circle cx="-12" cy="-12" r="58" fill="none" stroke="url(#break)" stroke-width="12"/>
    <line x1="32" y1="32" x2="74" y2="74" stroke="url(#break)" stroke-width="14" stroke-linecap="round"/>
    <!-- the flaw it finds -->
    <path d="M-30 -12 l16 -16 l4 26 l18 -10" fill="none" stroke="#ff5d5d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="118" text-anchor="middle" fill="#7ad0ff" font-size="30" letter-spacing="2">BREAK</text>
  </g>

  <!-- title -->
  <text x="600" y="78" text-anchor="middle" fill="#f4f6fb" font-size="46" font-weight="bold">Don't Trust the Build.</text>
  <text x="600" y="572" text-anchor="middle" fill="#9fb0cc" font-size="26" font-style="italic">Build it with one mind. Break it with another.</text>
</svg>
