<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Forge has two builds: Build One Workhorse, Build Two Steward">
  <rect width="1200" height="520" fill="#0b0b0c"/>
  <text x="600" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="46" fill="#d8a84a" letter-spacing="10">FORGE</text>
  <text x="600" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8a8a86">the build, in the open</text>
  <path d="M600 142 L600 184 M320 184 L880 184 M320 184 L320 232 M880 184 L880 232" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="120" y="232" width="400" height="208" rx="14" fill="#141416" stroke="#2a2a2c" stroke-width="2"/>
  <text x="320" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#c8442f" letter-spacing="3">BUILD ONE</text>
  <text x="320" y="334" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#f5f3ee">Workhorse</text>
  <text x="320" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#9a9a96">the machine that builds</text>
  <rect x="680" y="232" width="400" height="208" rx="14" fill="#141416" stroke="#d8a84a" stroke-width="2"/>
  <text x="880" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#d8a84a" letter-spacing="3">BUILD TWO</text>
  <text x="880" y="334" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#f5f3ee">Steward</text>
  <text x="880" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#9a9a96">a tool for the crew</text>
</svg>
