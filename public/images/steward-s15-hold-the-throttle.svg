<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="The Agentic ForgeLine — six stations on a rail line">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7a18"/>
      <stop offset="1" stop-color="#ffb347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff7a18" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="980" cy="330" rx="320" ry="220" fill="url(#glow)"/>

  <!-- title -->
  <text x="80" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#f0f6fc" font-weight="700">The Agentic ForgeLine</text>
  <text x="82" y="166" font-family="Verdana, Geneva, sans-serif" font-size="23" fill="#8b949e">S15 &#183; two backend pieces, built by the line, proven live</text>

  <!-- rail -->
  <g stroke="#3d444d" stroke-width="6">
    <line x1="120" y1="360" x2="1080" y2="360"/>
    <line x1="120" y1="384" x2="1080" y2="384"/>
  </g>
  <g stroke="#2a2f37" stroke-width="9">
    <line x1="150" y1="350" x2="150" y2="394"/><line x1="270" y1="350" x2="270" y2="394"/>
    <line x1="390" y1="350" x2="390" y2="394"/><line x1="510" y1="350" x2="510" y2="394"/>
    <line x1="630" y1="350" x2="630" y2="394"/><line x1="750" y1="350" x2="750" y2="394"/>
    <line x1="870" y1="350" x2="870" y2="394"/><line x1="990" y1="350" x2="990" y2="394"/>
  </g>

  <!-- 6 stations -->
  <g font-family="Verdana, Geneva, sans-serif" font-size="20" fill="#c9d1d9" text-anchor="middle">
    <g>
      <circle cx="200" cy="372" r="13" fill="#161b22" stroke="url(#ember)" stroke-width="4"/>
      <text x="200" y="300" fill="#f0f6fc" font-weight="700">OPEN</text>
    </g>
    <g>
      <circle cx="340" cy="372" r="13" fill="#161b22" stroke="url(#ember)" stroke-width="4"/>
      <text x="340" y="470" fill="#f0f6fc" font-weight="700">SCOPE</text>
    </g>
    <g>
      <circle cx="480" cy="372" r="13" fill="#161b22" stroke="url(#ember)" stroke-width="4"/>
      <text x="480" y="300" fill="#f0f6fc" font-weight="700">PLAN</text>
    </g>
    <g>
      <circle cx="620" cy="372" r="15" fill="#161b22" stroke="url(#ember)" stroke-width="5"/>
      <text x="620" y="470" fill="#ffb347" font-weight="700">REVIEW</text>
      <text x="620" y="496" font-size="15" fill="#8b949e">caught 6 P0s</text>
    </g>
    <g>
      <circle cx="760" cy="372" r="13" fill="#161b22" stroke="url(#ember)" stroke-width="4"/>
      <text x="760" y="300" fill="#f0f6fc" font-weight="700">SHIP</text>
    </g>
    <g>
      <circle cx="900" cy="372" r="13" fill="#161b22" stroke="url(#ember)" stroke-width="4"/>
      <text x="900" y="470" fill="#f0f6fc" font-weight="700">CLOSE</text>
    </g>
  </g>

  <!-- locomotive -->
  <g transform="translate(1010,332)">
    <rect x="0" y="6" width="74" height="40" rx="5" fill="#21262d" stroke="url(#ember)" stroke-width="3"/>
    <rect x="50" y="-12" width="24" height="22" rx="3" fill="#21262d" stroke="url(#ember)" stroke-width="3"/>
    <circle cx="16" cy="52" r="9" fill="#0d1117" stroke="#8b949e" stroke-width="3"/>
    <circle cx="44" cy="52" r="9" fill="#0d1117" stroke="#8b949e" stroke-width="3"/>
    <circle cx="12" cy="-6" r="5" fill="url(#ember)"/>
  </g>

  <!-- throttle line -->
  <text x="80" y="566" font-family="Georgia, 'Times New Roman', serif" font-size="27" fill="#ffb347" font-style="italic">The machine does the labor. I hold the throttle.</text>
</svg>
