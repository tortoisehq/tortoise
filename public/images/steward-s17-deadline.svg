<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" aria-label="The deadline never beats you">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15151c"/>
      <stop offset="1" stop-color="#0e0e14"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" rx="18" fill="url(#bg2)"/>
  <!-- rail curving toward a horizon (the deadline) -->
  <path d="M40 280 C 180 250, 250 170, 300 70" fill="none" stroke="#2a2a36" stroke-width="4"/>
  <path d="M86 286 C 226 256, 296 176, 346 76" fill="none" stroke="#2a2a36" stroke-width="4"/>
  <g stroke="#2a2a36" stroke-width="5">
    <line x1="70" y1="276" x2="92" y2="290"/>
    <line x1="120" y1="258" x2="146" y2="270"/>
    <line x1="172" y1="232" x2="200" y2="242"/>
    <line x1="222" y1="196" x2="250" y2="204"/>
  </g>
  <!-- clock face -->
  <circle cx="180" cy="150" r="78" fill="#1f1f29" stroke="#3a3a48" stroke-width="3"/>
  <circle cx="180" cy="150" r="78" fill="none" stroke="#e4c14a" stroke-width="5" stroke-dasharray="368 122" stroke-dashoffset="-92" transform="rotate(-90 180 150)" stroke-linecap="round"/>
  <g stroke="#5a5a66" stroke-width="3" stroke-linecap="round">
    <line x1="180" y1="84" x2="180" y2="96"/>
    <line x1="180" y1="204" x2="180" y2="216"/>
    <line x1="114" y1="150" x2="126" y2="150"/>
    <line x1="234" y1="150" x2="246" y2="150"/>
  </g>
  <!-- hands -->
  <line x1="180" y1="150" x2="180" y2="106" stroke="#e8e8ee" stroke-width="5" stroke-linecap="round"/>
  <line x1="180" y1="150" x2="214" y2="166" stroke="#3ad1c4" stroke-width="5" stroke-linecap="round"/>
  <circle cx="180" cy="150" r="6" fill="#3ad1c4"/>
  <!-- the "filed in time" check, ahead of the clock -->
  <circle cx="330" cy="150" r="46" fill="#12121a" stroke="#3ad1c4" stroke-width="3"/>
  <path d="M310 150 l13 14 l24 -30" fill="none" stroke="#3ad1c4" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="240" y="44" text-anchor="middle" fill="#e8e8ee" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">The deadline never beats you.</text>
  <text x="330" y="214" text-anchor="middle" fill="#9999a3" font-family="Segoe UI, Arial, sans-serif" font-size="12">filed in time</text>
</svg>
