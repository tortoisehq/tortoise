<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="640" height="400" fill="#0f1115"/>
  <text x="40" y="52" fill="#f4f4f5" font-size="26" font-weight="700">I Built the Test</text>
  <text x="40" y="80" fill="#9ca3af" font-size="15">Every learning objective became a question. Miss one, it comes back first.</text>

  <!-- quiz card -->
  <rect x="40" y="110" width="560" height="250" rx="10" fill="#16181d" stroke="#27272a" stroke-width="1.5"/>

  <text x="64" y="150" fill="#a1a1aa" font-size="12" letter-spacing="2">E31 · CLAUDE 101 — MODULE 1</text>
  <text x="64" y="182" fill="#f4f4f5" font-size="23" font-weight="700">Meet Claude</text>
  <text x="64" y="208" fill="#9ca3af" font-size="14">11 questions across all four lessons + one golden nugget</text>

  <!-- question dots: 11, one red = the trap -->
  <circle cx="74"  cy="250" r="11" fill="#22c55e"/>
  <circle cx="106" cy="250" r="11" fill="#22c55e"/>
  <circle cx="138" cy="250" r="11" fill="#22c55e"/>
  <circle cx="170" cy="250" r="11" fill="#22c55e"/>
  <circle cx="202" cy="250" r="11" fill="#22c55e"/>
  <circle cx="234" cy="250" r="11" fill="#ef4444"/>
  <circle cx="266" cy="250" r="11" fill="#22c55e"/>
  <circle cx="298" cy="250" r="11" fill="#22c55e"/>
  <circle cx="330" cy="250" r="11" fill="#22c55e"/>
  <circle cx="362" cy="250" r="11" fill="#22c55e"/>
  <circle cx="394" cy="250" r="11" fill="#22c55e"/>
  <text x="420" y="255" fill="#71717a" font-size="13">&#8592; the trap I built in on purpose</text>

  <!-- score row -->
  <rect x="64" y="290" width="512" height="44" rx="8" fill="#0f1115" stroke="#27272a" stroke-width="1"/>
  <text x="80" y="318" fill="#a1a1aa" font-size="14">Self-scoring &#183; saved in your browser</text>
  <text x="560" y="318" fill="#22c55e" font-size="15" font-weight="700" text-anchor="end">Best 11/11 &#183; streak</text>

  <text x="40" y="388" fill="#9ca3af" font-size="13">Taking the course is consumption. Writing the quiz for it is production.</text>
</svg>
