<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="640" height="400" fill="#0f1115"/>
  <text x="40" y="52" fill="#f4f4f5" font-size="26" font-weight="700">Size of the Job, Not the Topic</text>
  <text x="40" y="80" fill="#9ca3af" font-size="15">Which Claude mode? Read the scale of the work, not the subject.</text>

  <!-- Chat -->
  <text x="40" y="140" fill="#f4f4f5" font-size="17" font-weight="700">Chat</text>
  <rect x="120" y="126" width="110" height="20" rx="5" fill="#22c55e"/>
  <text x="244" y="141" fill="#9ca3af" font-size="13">"What does this metric mean?" — quick, you steer each turn</text>

  <!-- Cowork (the trap) -->
  <text x="40" y="212" fill="#f4f4f5" font-size="17" font-weight="700">Cowork</text>
  <rect x="120" y="198" width="430" height="20" rx="5" fill="#f59e0b"/>
  <text x="120" y="244" fill="#f59e0b" font-size="13" font-weight="700">"Read 50 contracts, write a memo" — sustained, many sources, a finished thing</text>
  <text x="120" y="262" fill="#71717a" font-size="12">&#8592; the one I called "Chat." Big job, not a quick chat.</text>

  <!-- Code -->
  <text x="40" y="320" fill="#f4f4f5" font-size="17" font-weight="700">Code</text>
  <rect x="120" y="306" width="250" height="20" rx="5" fill="#3b82f6"/>
  <text x="384" y="321" fill="#9ca3af" font-size="13">"Build &amp; deploy the feature" — writing software</text>

  <line x1="120" y1="360" x2="600" y2="360" stroke="#374151" stroke-width="1.5"/>
  <text x="120" y="384" fill="#9ca3af" font-size="13">Bar length = how big the job is. The topic doesn't pick the mode — the scale does.</text>
</svg>
